<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ねこのて — 猫ボランティア</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <section class="hero" aria-label="ヒーロー">
      <div class="hero__media" aria-hidden="true">
        <img
          class="hero__image"
          src="assets/hero-banner.png"
          alt=""
          width="1920"
          height="1080"
          decoding="async"
          fetchpriority="high"
        />
      </div>

      <div class="hero__veil" aria-hidden="true"></div>

      <div class="hero__content">
        <h1 class="hero__brand">ねこのて</h1>
        <p class="hero__lead" id="lead" aria-live="polite">
          小さな手で、ねこの毎日をあたためる。<br />
          保護猫ボランティアを、ここから。
        </p>
        <a class="hero__cta" href="#volunteer">ボランティアを始める</a>
      </div>
    </section>

    <script src="script.js" defer></script>
  </body>
</html>
